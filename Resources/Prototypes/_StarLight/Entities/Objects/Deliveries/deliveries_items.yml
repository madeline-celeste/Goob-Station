- type: entity
  id: MailTraitorSpamLetter
  name: Reasons to choose The Syndicate!
  description: An advertisement for the The Syndicate.
  parent: [ Paper, BaseSyndicateContraband ]
  components:
    - type: Paper
      content: delivery-spam-reasons-to-join-syndicate
      editingDisabled: true
    - type: AntagOnSign
      chance: 1.00
      antags:
        - antag: Traitor
          targetComponent: TraitorRule

- type: entity
  id: MailThiefSpamLetter
  name: Don't you want more?
  description: An inciting paper that smells faintly of welding fuel and desire.
  parent: [ Paper, BaseMajorContraband ]
  components:
    - type: Paper
      content: delivery-spam-dont-you-want-more
      editingDisabled: true
    - type: AntagOnSign
      chance: 1.00
      antags:
        - antag: Thief
          targetComponent: ThiefRule
